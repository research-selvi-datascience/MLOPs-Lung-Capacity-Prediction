name: Full ML Pipeline

on:
  push:
    branches:
      - feature/continuous-training
      - main

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Train model
        run: python -m preprocess_data.train

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/

  build:
    needs: train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model
          path: models/

      - name: Docker login
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_GITHUB_TOKEN }}

      - name: Build image
        run: docker build . -t ${{ secrets.DOCKERHUB_USERNAME }}/lung-app:latest

      - name: Push image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/lung-app:latest